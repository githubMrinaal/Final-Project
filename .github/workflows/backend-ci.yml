name: Backend CI
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Create application.properties
        run: |
          mkdir -p src/main/resources
          printf 'spring.application.name=workflow-app\nspring.datasource.url=jdbc:h2:mem:workflowdb\nspring.datasource.username=sa\nspring.datasource.password=\nspring.h2.console.enabled=true\nspring.jpa.hibernate.ddl-auto=create-drop\nspring.jpa.show-sql=false\nspring.jpa.open-in-view=false\njwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970\njwt.expiration=86400000\n' > src/main/resources/application.properties
      - name: Run tests
        run: mvn test
      - name: Build package
        run: mvn package -DskipTests

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Create application.properties
        run: |
          mkdir -p src/main/resources
          printf 'spring.application.name=workflow-app\nspring.datasource.url=jdbc:h2:mem:workflowdb\nspring.datasource.username=sa\nspring.datasource.password=\nspring.h2.console.enabled=true\nspring.jpa.hibernate.ddl-auto=create-drop\nspring.jpa.show-sql=false\nspring.jpa.open-in-view=false\njwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970\njwt.expiration=86400000\n' > src/main/resources/application.properties

      - name: Build JAR
        run: mvn clean package -DskipTests

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Copy JAR to server
        run: |
          scp -i ~/.ssh/deploy_key \
            target/workflow-app-0.0.1-SNAPSHOT.jar \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/home/mrinaal/workflow-app-0.0.1-SNAPSHOT.jar

      - name: Restart backend service
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "sudo systemctl restart workflow-backend && sudo systemctl status workflow-backend"
